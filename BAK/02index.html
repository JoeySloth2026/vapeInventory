<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --brand-color: #2c3e50; }
        .accordion-button { font-weight: 600; color: var(--brand-color); }
        .accordion-button:not(.collapsed) { background-color: #f8f9fa; color: #007bff; box-shadow: none; }
        .in-stock { color: #198754 !important; font-weight: bold; }
        .out-of-stock { color: #dc3545 !important; font-weight: bold; }
        .category-meta { font-weight: normal; font-size: 0.85rem; color: #6c757d; margin-left: 10px; }
        .loading-spyder { text-align: center; padding: 50px; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="text-center mb-4">
        <h2 id="main-title" class="display-5 fw-bold">Daily Inventory</h2>
        <p id="loading-text" class="text-muted">Loading latest stock data...</p>
    </div>

    <div id="inventory-display" class="accordion shadow-sm"></div>
</div>

<script>
    // CONFIGURATION: The name of your file on GitHub
    const EXCEL_FILE_NAME = 'inventory.xlsx';

    window.onload = function() {
        fetch(EXCEL_FILE_NAME + '?t=' + new Date().getTime()) // Added timestamp to prevent cache issues
            .then(res => {
                if (!res.ok) throw new Error("Excel file not found on server.");
                return res.arrayBuffer();
            })
            .then(ab => {
                const data = new Uint8Array(ab);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rawData = XLSX.utils.sheet_to_json(firstSheet);
                
                document.getElementById('loading-text').classList.add('hidden');
                updateTitle();
                render(rawData);
            })
            .catch(err => {
                document.getElementById('loading-text').innerHTML = 
                    `<div class="alert alert-danger">Error: ${EXCEL_FILE_NAME} not found. <br> 
                    Make sure the Excel file is uploaded to the same folder as this HTML file.</div>`;
            });
    };

    function updateTitle() {
        const titleElement = document.getElementById('main-title');
        const today = new Date();
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        titleElement.innerText = `Inventory - ${today.toLocaleDateString(undefined, options)}`;
    }

    function render(data) {
        const container = document.getElementById('inventory-display');
        container.innerHTML = '';
        let html = '';
        let groupCount = 0;

        data.forEach((row) => {
            const rawName = String(row['Name'] || '');
            const variant = String(row['Variant Value'] || '');
            const qty = parseFloat(row['Free To Use Quantity']) || 0;
            const categoryMatch = rawName.match(/\((\d+)\)\s*$/);

            if (categoryMatch) {
                if (groupCount > 0) html += `</tbody></table></div></div></div>`;
                groupCount++;
                const countVal = categoryMatch[1];
                const displayName = rawName.replace(categoryMatch[0], '').trim();

                html += `
                <div class="accordion-item border-0 mb-2 shadow-sm">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed rounded" type="button" data-bs-toggle="collapse" data-bs-target="#group${groupCount}">
                            <div class="d-flex justify-content-between align-items-center w-100 me-3">
                                <span>${displayName} <span class="category-meta">(${countVal} SKUs)</span></span>
                                <span class="badge bg-dark rounded-pill">Total: ${qty}</span>
                            </div>
                        </button>
                    </h2>
                    <div id="group${groupCount}" class="accordion-collapse collapse">
                        <div class="accordion-body p-0">
                            <table class="table mb-0 table-hover">
                                <thead class="table-light"><tr><th class="ps-4">Variant</th><th class="text-end pe-4">Available</th></tr></thead>
                                <tbody>`;
            } else if (groupCount > 0) {
                const stockClass = qty > 0 ? 'in-stock' : 'out-of-stock';
                const displayText = qty > 0 ? qty.toLocaleString() : 'Sold Out';
                html += `
                    <tr>
                        <td class="ps-4 py-3">${variant || 'Standard'}</td>
                        <td class="text-end pe-4 py-3 ${stockClass}">${displayText}</td>
                    </tr>`;
            }
        });
        html += `</tbody></table></div></div></div>`;
        container.innerHTML = html;
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
