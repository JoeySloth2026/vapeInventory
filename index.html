<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --brand-color: #2c3e50; }
        .accordion-button { font-weight: 600; color: var(--brand-color); }
        .accordion-button:not(.collapsed) { background-color: #f8f9fa; color: #007bff; box-shadow: none; }
        
        /* Color Requirements */
        .in-stock { color: #198754 !important; font-weight: bold; }
        .out-of-stock { color: #dc3545 !important; font-weight: bold; }
        
        .category-meta { font-weight: normal; font-size: 0.85rem; color: #6c757d; margin-left: 10px; }
        .hidden { display: none !important; }
        #main-title { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="text-center mb-4">
        <h1 id="main-title" class="display-5 fw-bold">Daily Inventory</h1>
    </div>

    <div id="upload-container" class="card shadow-sm border-0 mb-4">
        <div class="card-body text-center">
            <input type="file" id="upload" class="form-control" accept=".xlsx, .xls">
            <p class="text-muted mt-2 small">Select your inventory spreadsheet to begin.</p>
        </div>
    </div>

    <div id="inventory-display" class="accordion shadow-sm"></div>
    
    <div class="text-center mt-4">
        <button id="reset-btn" class="btn btn-outline-secondary btn-sm hidden" onclick="location.reload()">Upload New File</button>
    </div>
</div>

<script>
    document.getElementById('upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            
            // 1. Update Title with Date
            updateTitle();

            // 2. Render Data
            render(rawData);

            // 3. Hide Upload UI
            document.getElementById('upload-container').classList.add('hidden');
            document.getElementById('reset-btn').classList.remove('hidden');
        };
        reader.readAsArrayBuffer(file);
    });

    function updateTitle() {
        const titleElement = document.getElementById('main-title');
        const today = new Date();
        
        // Format: Month Day, Year (e.g., April 13, 2026)
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        const dateString = today.toLocaleDateString(undefined, options);
        
        titleElement.innerText = `Daily Inventory - ${dateString}`;
    }

    function render(data) {
        const container = document.getElementById('inventory-display');
        container.innerHTML = '';
        let html = '';
        let groupCount = 0;

        data.forEach((row) => {
            const rawName = String(row['Name'] || '');
            const variant = String(row['Variant Value'] || '');
            const qty = parseFloat(row['Free To Use Quantity']) || 0;

            const categoryMatch = rawName.match(/\((\d+)\)\s*$/);

            if (categoryMatch) {
                if (groupCount > 0) html += `</tbody></table></div></div></div>`;
                
                groupCount++;
                const countVal = categoryMatch[1];
                const displayName = rawName.replace(categoryMatch[0], '').trim();

                html += `
                <div class="accordion-item border-0 mb-2 shadow-sm">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed rounded" type="button" data-bs-toggle="collapse" data-bs-target="#group${groupCount}">
                            <div class="d-flex justify-content-between align-items-center w-100 me-3">
                                <span>${displayName} <span class="category-meta">(${countVal} SKUs)</span></span>
                                <span class="badge bg-dark rounded-pill">Total: ${qty}</span>
                            </div>
                        </button>
                    </h2>
                    <div id="group${groupCount}" class="accordion-collapse collapse">
                        <div class="accordion-body p-0">
                            <table class="table mb-0 table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4 py-2 border-0">Variant</th>
                                        <th class="text-end pe-4 py-2 border-0">Available</th>
                                    </tr>
                                </thead>
                                <tbody>`;
            } else if (groupCount > 0) {
                const stockClass = qty > 0 ? 'in-stock' : 'out-of-stock';
                const displayText = qty > 0 ? qty.toLocaleString() : 'Sold Out';

                html += `
                    <tr>
                        <td class="ps-4 py-3">${variant || 'Standard'}</td>
                        <td class="text-end pe-4 py-3 ${stockClass}">
                            ${displayText}
                        </td>
                    </tr>`;
            }
        });

        html += `</tbody></table></div></div></div>`;
        container.innerHTML = html;
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
